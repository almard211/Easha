<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>إدارة الإعاشة - المحفظة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F7FC;
  --surface: #FFFFFF;
  --primary: #4318FF;
  --primary-gradient: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
  --text-main: #1B254B;
  --text-sec: #A3AED0;
  --success: #05CD99;
  --danger: #EE5D50;
  --warning: #FFCE20;
  --border: #E0E5F2;
  --radius-lg: 24px;
  --radius-md: 16px;
  --shadow-sm: 0px 4px 12px rgba(0, 0, 0, 0.03);
  --shadow-lg: 0px 18px 40px rgba(112, 144, 176, 0.12);
  --nav-height: 70px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: calc(var(--nav-height) + 30px); }

/* Top Header */
.top-header { padding: 24px 20px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: opacity 0.2s; }
.top-header:active { opacity: 0.7; }
.top-header h1 { font-size: 22px; font-weight: 800; color: var(--text-main); margin-bottom: 2px; }
.top-header .user-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-gradient); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; box-shadow: var(--shadow-sm); }

main { padding: 0 20px; }
.section { display: none; animation: fadeUp 0.4s ease forwards; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* Wallet Card Concept */
.wallet-card { background: var(--primary-gradient); border-radius: var(--radius-lg); padding: 24px; color: white; position: relative; overflow: hidden; box-shadow: 0 14px 32px rgba(67, 24, 255, 0.25); margin-bottom: 24px; }
.wallet-card::after { content: ''; position: absolute; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; top: -50px; left: -50px; }
.wallet-card-header { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; margin-bottom: 24px; }
.wallet-card-header select { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 12px; outline: none; font-family: inherit; font-weight: 700; font-size: 14px; backdrop-filter: blur(4px); max-width: 150px; }
.wallet-card-header select option { color: var(--text-main); }
.balance-label { font-size: 14px; opacity: 0.9; font-weight: 600; margin-bottom: 4px; display: block; }
.balance-value { font-size: 38px; font-weight: 900; line-height: 1; position: relative; z-index: 2; margin-bottom: 8px; }
.balance-value span { font-size: 18px; font-weight: 700; opacity: 0.9; }
.wallet-stats { display: flex; justify-content: space-between; margin-top: 24px; position: relative; z-index: 2; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 16px; }
.w-stat { display: flex; flex-direction: column; }
.w-stat span { font-size: 12px; opacity: 0.9; margin-bottom: 2px; }
.w-stat b { font-size: 16px; font-weight: 800; }

/* Quick Actions */
.quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; border: none; background: transparent; cursor: pointer; }
.action-icon { width: 56px; height: 56px; background: var(--surface); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); color: var(--primary); transition: transform 0.2s; }
.action-btn:active .action-icon { transform: scale(0.9); }
.action-icon svg { width: 24px; height: 24px; stroke-width: 2.2; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
.action-btn span { font-size: 13px; font-weight: 800; color: var(--text-main); font-family: inherit; }

/* Section Titles & Small Buttons */
.sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.sec-header h3 { font-size: 18px; font-weight: 900; }
.sec-header .badge { background: rgba(67, 24, 255, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; }
.btn-sm { background: var(--primary-gradient); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-family: inherit; font-weight: 800; font-size: 13px; cursor: pointer; box-shadow: var(--shadow-sm); transition: transform 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-sm:active { transform: scale(0.95); }

/* Lists & Rows */
.list-container { display: flex; flex-direction: column; gap: 12px; }
.list-item { background: var(--surface); border-radius: var(--radius-md); padding: 16px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: 0.2s; flex-wrap: wrap; }
.item-main { display: flex; align-items: center; gap: 14px; width: 100%; }
.item-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 800; font-size: 16px; }
.icon-blue { background: rgba(67, 24, 255, 0.1); color: var(--primary); }
.icon-red { background: rgba(238, 93, 80, 0.1); color: var(--danger); }
.icon-green { background: rgba(5, 205, 153, 0.1); color: var(--success); }
.item-content { flex: 1; }
.item-content h4 { font-size: 15px; font-weight: 800; margin-bottom: 4px; color: var(--text-main); }
.item-content p { font-size: 12px; color: var(--text-sec); font-weight: 700; line-height: 1.4; }

/* Activity specific styles */
.act-title-blue { color: var(--primary) !important; font-weight: 800 !important; font-size: 11px !important; }
.act-title-red { color: var(--danger) !important; font-weight: 800 !important; font-size: 11px !important; }
.act-title-green { color: var(--success) !important; font-weight: 800 !important; font-size: 11px !important; }

.item-trailing { text-align: left; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.item-trailing b { font-size: 15px; font-weight: 800; }
.status-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 800; }
.status-paid { background: rgba(5, 205, 153, 0.15); color: #047857; }
.status-unpaid { background: rgba(238, 93, 80, 0.15); color: #b91c1c; }

/* Action Buttons within Lists */
.action-row { display: flex; gap: 6px; margin-top: 4px; justify-content: flex-end; }
.btn-icon { width: 32px; height: 32px; border: none; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(163, 174, 208, 0.15); color: var(--text-sec); transition: 0.2s; }
.btn-icon:active { transform: scale(0.9); }
.btn-icon.edit { color: var(--primary); background: rgba(67, 24, 255, 0.1); }
.btn-icon.delete { color: var(--danger); background: rgba(238, 93, 80, 0.1); }
.btn-icon.more { color: var(--text-main); background: rgba(163, 174, 208, 0.25); }
.btn-icon svg { width: 16px; height: 16px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* Filter Tabs */
.tabs { display: flex; background: var(--border); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
.tab { flex: 1; border: none; background: transparent; padding: 10px; font-family: inherit; font-weight: 800; color: var(--text-sec); border-radius: 10px; cursor: pointer; transition: 0.3s; }
.tab.active { background: var(--surface); color: var(--text-main); box-shadow: var(--shadow-sm); }

/* Floating Bottom Nav (Pill Style) */
.pill-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: var(--nav-height); background: var(--text-main); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; box-shadow: 0 20px 40px rgba(27, 37, 75, 0.2); z-index: 100; }
.nav-item { border: none; background: transparent; color: var(--text-sec); padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: color 0.3s; }
.nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.nav-item.active { color: white; }
.nav-item.active::after { content: ''; position: absolute; bottom: -2px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); }

/* Forms & Inputs */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 800; color: var(--text-sec); margin-bottom: 8px; }
.form-group input, .form-group select { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); font-family: inherit; font-size: 15px; font-weight: 700; outline: none; transition: 0.2s; }
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1); }
.btn-primary { width: 100%; padding: 16px; border-radius: 16px; background: var(--primary-gradient); color: white; border: none; font-family: inherit; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2); transition: 0.2s; }
.btn-primary:active { transform: scale(0.97); }

/* Bottom Sheet Modals */
.modal-overlay { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(27, 37, 75, 0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.active { display: flex; animation: fadeIn 0.2s; }
.bottom-sheet { width: 100%; background: var(--surface); border-radius: 32px 32px 0 0; padding: 24px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
.modal-overlay.active .bottom-sheet { transform: translateY(0); }
.sheet-indicator { width: 40px; height: 5px; background: var(--border); border-radius: 10px; margin: 0 auto 20px; }
.sheet-title { font-size: 20px; font-weight: 900; margin-bottom: 24px; text-align: center; }

/* Status Menu Design */
.status-menu-list { display: flex; flex-direction: column; }
.status-menu-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 8px; border-bottom: 1px solid var(--border); background: transparent; border: none; width: 100%; font-family: inherit; font-size: 18px; font-weight: 800; color: var(--text-main); cursor: pointer; transition: 0.2s; }
.status-menu-item:active { background: rgba(0,0,0,0.02); }
.status-menu-item:last-child { border-bottom: none; }
.status-icon-box { width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
.status-icon-box svg { width: 28px; height: 28px; stroke-width: 2.5; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
.bg-green-soft { background: #E6F4EA; color: #1E8E3E; }
.bg-red-soft { background: #FCE8E6; color: #D93025; }
.bg-yellow-soft { background: #FEF7E0; color: #F9AB00; }
.bg-blue-soft { background: #E8F0FE; color: #1A73E8; }
.btn-cancel-large { width: 100%; padding: 18px; border-radius: 16px; background: #F1F3F4; color: var(--text-main); border: none; font-family: inherit; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 16px; transition: 0.2s; }
.btn-cancel-large:active { background: #E8EAED; }

.report-box { background: white; padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
.report-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
.report-table th, .report-table td { padding: 10px; text-align: right; border-bottom: 1px solid var(--border); }
.report-table th { color: var(--text-sec); font-weight: 800; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sec); }

/* v20 glass stat widgets + progress */
.wallet-stats{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:10px!important;border-top:1px solid rgba(255,255,255,0.18)!important;padding-top:16px!important}
.w-stat{min-height:64px;border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:16px;padding:9px 10px;display:grid!important;grid-template-columns:28px 1fr;align-items:center;column-gap:8px}
.w-stat .glass-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:#fff;opacity:.95;grid-row:1/3}
.w-stat .glass-icon svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.w-stat span{font-size:11px!important;opacity:.9!important;margin:0!important;text-align:right}
.w-stat b{font-size:14px!important;font-weight:900!important;text-align:right;line-height:1.25}
.collection-summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 0 14px}
.collection-summary-card{position:relative;overflow:hidden;min-height:82px;background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.9);border-radius:18px;box-shadow:var(--shadow-sm);padding:12px;display:grid;grid-template-columns:32px 1fr;align-items:center;column-gap:9px}
.collection-summary-card::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.45),transparent);pointer-events:none}
.collection-summary-card .summary-icon{position:relative;z-index:1;width:32px;height:32px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.collection-summary-card .summary-icon svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.collection-summary-card .summary-content{position:relative;z-index:1;text-align:right}
.collection-summary-card .summary-label{display:block;color:var(--text-sec);font-size:12px;font-weight:800;margin-bottom:3px}
.collection-summary-card .summary-value{display:block;font-size:18px;font-weight:900;color:var(--text-main);line-height:1.2}
.summary-green{background:linear-gradient(135deg,rgba(5,205,153,.14),rgba(255,255,255,.9))}
.summary-green .summary-icon{color:var(--success);background:rgba(5,205,153,.12)}
.summary-orange{background:linear-gradient(135deg,rgba(255,206,32,.16),rgba(255,255,255,.9))}
.summary-orange .summary-icon{color:#D98A00;background:rgba(255,206,32,.15)}
.summary-blue{background:linear-gradient(135deg,rgba(67,24,255,.12),rgba(255,255,255,.9))}
.summary-blue .summary-icon{color:var(--primary);background:rgba(67,24,255,.10)}
.summary-purple{background:linear-gradient(135deg,rgba(134,140,255,.14),rgba(255,255,255,.9))}
.summary-purple .summary-icon{color:#6B4CFF;background:rgba(134,140,255,.13)}
.progress-card{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);border-radius:18px;padding:14px;margin:0 0 14px}
.progress-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-head span{color:var(--text-sec);font-size:12px;font-weight:800}
.progress-head b{color:var(--primary);font-size:16px;font-weight:900}
.progress-track{width:100%;height:9px;border-radius:999px;background:rgba(67,24,255,.10);overflow:hidden}
.progress-fill{height:100%;width:0%;border-radius:999px;background:var(--primary-gradient);transition:width .35s ease}


/* v21 balance wallet glass widgets + force detail summary visible */
.wallet-card{
  padding:24px 18px!important;
}
.wallet-stats{
  display:grid!important;
  grid-template-columns:repeat(3,minmax(0,1fr))!important;

/* v25 A4 share report styling */
.report-box{
  background:#fff!important;
}
.report-a4{
  width:794px;
  min-height:1123px;
  background:#fff;
  color:#1B254B;
  padding:58px 56px;
  direction:rtl;
  font-family:'Cairo',sans-serif;
  box-sizing:border-box;
}
.report-a4 .report-title{
  text-align:center;
  margin-bottom:24px;
}
.report-a4 .report-title h2{
  font-size:26px;
  font-weight:900;
  margin:0 0 4px;
}
.report-a4 .report-title h3{
  font-size:21px;
  font-weight:800;
  margin:0 0 6px;
}
.report-a4 .report-title p{
  color:#8A94A6;
  font-size:13px;
  font-weight:700;
}
.report-a4 table{
  width:100%;
  border-collapse:collapse;
  margin-top:22px;
  font-size:15px;
}
.report-a4 th{
  color:#6B7280;
  font-weight:800;
  text-align:right;
  padding:10px 12px;
  border-bottom:1px solid #E5E7EB;
  background:transparent!important;
}
.report-a4 td{
  padding:9px 12px;
  border-bottom:1px solid #EEF2F7;
  background:transparent!important;
}
.report-a4 tbody tr:nth-child(even),
.report-a4 tbody tr:nth-child(odd){
  background:transparent!important;
}
.report-a4 .muted-name{
  color:#6B7280;
  font-weight:700;
}
.report-a4 .amount-cell{
  color:#4B5563;
  font-weight:800;
}
.report-a4 .status-cell{
  font-weight:800;
}
.report-a4-footer{
  position:absolute;
  bottom:36px;

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
window.shareReport = async function() {
  var area = document.getElementById('printArea');
  if (!area) {
    alert('اختر قطة للتقرير أولاً');
    return;
  }
  try {
    if (window.html2canvas) {
      var canvas = await html2canvas(area, { backgroundColor: '#ffffff', scale: 2 });
      canvas.toBlob(async function(blob) {
        var file = new File([blob], 'تقرير-الإعاشة.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ title: 'تقرير الإعاشة', files: [file] });
        } else if (navigator.share) {
          var url = URL.createObjectURL(blob);
          await navigator.share({ title: 'تقرير الإعاشة', text: 'تم إنشاء تقرير الإعاشة' });
          URL.revokeObjectURL(url);
        } else {
          var url2 = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url2;
          a.download = 'تقرير-الإعاشة.png';
          a.click();
          URL.revokeObjectURL(url2);
        }
      }, 'image/png');
    } else {
      window.print();
    }
  } catch (e) {
    window.print();
  }
};
</script>

<script>
window.onerror = function(msg, url, line) {
  alert("حدث خطأ يمنع النظام من العمل: " + msg + "\nالسطر: " + line);
  return false;
};

try {
  var STORE_KEY = "easha-management-wallet";
  var db = { members: [], collections: [], purchases: [], activities: [], userName: '', theme: 'violet' };
  var selectedCollectionId = null;
  var currentViewCollectionId = null;
  var paymentFilter = 'all';
  var currentEditCallback = null;

  function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
  function today() { return new Date().toISOString().slice(0,10); }
  function money(n) { return Number(n||0).toLocaleString("en-US", {maximumFractionDigits:2}); }
  function getInitials(name) { return name ? name.substring(0, 2) : 'ع'; }

  function load() {
    try {
      var saved = localStorage.getItem(STORE_KEY);
      if (saved) {
        var parsed = JSON.parse(saved);
        db.members = parsed.members || [];
        db.collections = parsed.collections || [];
        db.purchases = parsed.purchases || [];
        db.activities = parsed.activities || [];
        db.userName = parsed.userName || '';
        db.theme = parsed.theme || 'violet';
      } else {
        var v3 = localStorage.getItem("easha-management-v3");
        if (v3) {
          var parsedV3 = JSON.parse(v3);
          db.members = parsedV3.members || [];
          db.collections = parsedV3.collections || [];
          db.purchases = parsedV3.purchases || [];
          db.activities = [];
        }
      }
    } catch (e) {
      console.log("Data Load Error", e);
    }
  }

  function save() { 
    localStorage.setItem(STORE_KEY, JSON.stringify(db)); 
    renderAll(); 
  }

  function logActivity(type, title, desc, amount) {
    db.activities = db.activities || [];
    db.activities.unshift({
      id: uid(),
      type: type,
      title: title,
      desc: desc,
      amount: amount
    });
  }

  function clearActivities() {
    if(confirm("هل تريد مسح سجل العمليات؟")) {
      db.activities = [];
      save();
    }
  }

  function goToSection(id) {
    showSection(id);
    var navs = document.querySelectorAll(".nav-item");
    for (var i = 0; i < navs.length; i++) {
      navs[i].classList.remove("active");
      if (navs[i].getAttribute("data-target") === id) {
        navs[i].classList.add("active");
      }
    }
  }

  function showSection(id) {
    var sections = document.querySelectorAll(".section");
    for (var s = 0; s < sections.length; s++) {
      sections[s].classList.remove("active");
    }
    var targetEl = document.getElementById(id);
    if (targetEl) targetEl.classList.add("active");
    if (id !== 'collections') closeCollectionDetail(false);
  }

  function openSheet(id) { 
    var el = document.getElementById(id);
    if (el) el.classList.add('active'); 
  }
  function closeSheetDirect(id) { 
    var el = document.getElementById(id);
    if (el) el.classList.remove('active'); 
  }
  function closeSheet(e, id) { 
    if (e.target.id === id) closeSheetDirect(id); 
  }

  function openPaymentSheetQuick() {
    if(!selectedCollectionId && db.collections.length === 0) return alert("أضف قطة أولاً");
    document.getElementById('payMemberContainer').style.display = 'block'; 
    openSheet('paymentSheet');
  }

  function openPaymentSheetFor(memId) {
    var sel = document.getElementById('payMember');
    if (sel) sel.value = memId;
    document.getElementById('payMemberContainer').style.display = 'none'; 
    openSheet('paymentSheet');
  }

  function openEditSheet(title, fields, callback) {
    currentEditCallback = callback;
    document.getElementById('editSheetTitle').innerText = title;
    
    var fieldsHTML = "";
    for (var i = 0; i < fields.length; i++) {
      var f = fields[i];
      var val = (f.value !== undefined && f.value !== null) ? f.value : "";
      fieldsHTML += '<div class="form-group"><label>' + f.label + '</label><input type="' + (f.type || 'text') + '" id="editInput_' + f.id + '" value="' + val + '"></div>';
    }
    
    document.getElementById('editSheetFields').innerHTML = fieldsHTML;
    openSheet('editActionSheet');
  }

  function submitEditSheet() {
    if (currentEditCallback) {
      currentEditCallback();
    }
    closeSheetDirect('editActionSheet');
  }


  var THEMES = {
    violet: { primary:'#4318FF', gradient:'linear-gradient(135deg, #4318FF 0%, #868CFF 100%)', nav:'#1B254B' },
    emerald:{ primary:'#6B7A3A', gradient:'linear-gradient(135deg, #6B7A3A 0%, #A3B36A 100%)', nav:'#2F351F' },
    sky:    { primary:'#0284C7', gradient:'linear-gradient(135deg, #0284C7 0%, #38BDF8 100%)', nav:'#12324A' },
    gold:   { primary:'#8B6F47', gradient:'linear-gradient(135deg, #8B6F47 0%, #C7A66A 100%)', nav:'#3A2F21' },
    navy:   { primary:'#111827', gradient:'linear-gradient(135deg, #111827 0%, #334155 100%)', nav:'#111827' }
  };

  function applyTheme(name) {
    var t = THEMES[name] || THEMES.violet;
    document.documentElement.style.setProperty('--primary', t.primary);
    document.documentElement.style.setProperty('--primary-gradient', t.gradient);
    document.documentElement.style.setProperty('--text-main', t.nav);
    db.theme = name;
    var opts = document.querySelectorAll('.theme-option');
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.toggle('active', opts[i].getAttribute('data-theme') === name);
    }
  }

  function selectTheme(name) {
    applyTheme(name);
  }

  function editUserName() {
    openEditSheet("الملف الشخصي", [
      { id: "uName", label: "اسم المستخدم", value: db.userName || "", type: "text" }
    ], function() {
      var newName = document.getElementById('editInput_uName').value.trim();
      db.userName = newName;
      save();
    });

    setTimeout(function(){
      var holder = document.getElementById('editSheetFields');
      if (!holder || document.getElementById('themePicker')) return;

      var group = document.createElement('div');
      group.className = 'form-group';
      group.id = 'themePicker';

      var label = document.createElement('label');
      label.textContent = 'اختر الثيم';
      group.appendChild(label);

      var picker = document.createElement('div');
      picker.className = 'theme-picker';

      var themeList = [
        ['violet', 'theme-violet', 'أزرق بنفسجي'],
        ['emerald', 'theme-emerald', 'أخضر زمردي'],
        ['sky', 'theme-sky', 'سماوي'],
        ['gold', 'theme-gold', 'ذهبي'],
        ['navy', 'theme-navy', 'كحلي']
      ];

      for (var i = 0; i < themeList.length; i++) {
        (function(themeName, cls, labelText){
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'theme-option ' + cls;
          btn.setAttribute('data-theme', themeName);
          btn.setAttribute('aria-label', labelText);
          btn.onclick = function(){ selectTheme(themeName); };

        })(themeList[i][0], themeList[i][1], themeList[i][2]);

    if (!name) return alert("اكتب الاسم");
    db.members.push({ id: uid(), name: name, phone: document.getElementById('memPhone').value });
    
    logActivity('member', 'إضافة عضو جديد', name, null);
    
    document.getElementById('memName').value = ''; 
    document.getElementById('memPhone').value = '';

  function editMember(id) {

    for(var i=0; i<db.members.length; i++) { if(db.members[i].id === id) m = db.members[i]; }
    if(!m) return;
    
    openEditSheet("تعديل بيانات العضو", [

  function deleteMember(id) {
    if(!confirm("هل أنت متأكد من حذف هذا العضو؟")) return;
    var newMembers = [];
    for(var i=0; i<db.members.length; i++) {
      if(db.members[i].id !== id) newMembers.push(db.members[i]);
    }
    db.members = newMembers;
    for(var j=0; j<db.collections.length; j++) {
      if(db.collections[j].payments && db.collections[j].payments[id]) {
          delete db.collections[j].payments[id];
      }
    }
    save();
  }

  function addCollection() {
    if (db.members.length === 0) return alert("أضف أعضاء أولاً");
    var name = document.getElementById('colName').value.trim() || 'قطة ' + today();
    var amount = Number(document.getElementById('colAmount').value || 0);
    var payments = {};
    for (var i = 0; i < db.members.length; i++) {
      payments[db.members[i].id] = { status: 'unpaid', amount: amount };
    }
    var c = { id: uid(), name: name, date: document.getElementById('colDate').value, amount: amount, payments: payments };
    db.collections.unshift(c);
    
    logActivity('collection', 'إنشاء قطة جديدة', name, null);
    
    selectedCollectionId = c.id;
    document.getElementById('colName').value = '';
    closeSheetDirect('addCollectionSheet'); 
    save();
  }

  function editCollectionRecord(event, id) {
    if(event) event.stopPropagation();
    var c = null;
    for(var i=0; i<db.collections.length; i++) { if(db.collections[i].id === id) c = db.collections[i]; }
    if(!c) return;

      { id: "cName", label: "اسم القطة", value: c.name, type: "text" },

    ], function() {
      var newName = document.getElementById('editInput_cName').value.trim();

      if (newName) c.name = newName;
      var parsedAmt = Number(newAmount);
      if (!isNaN(parsedAmt)) c.amount = parsedAmt;

  function addPurchase() {
    var latest = latestCollection();
    var colId = document.getElementById('purCollection').value || (latest ? latest.id : "");
    if (!colId) return alert("اختر قطة من القائمة المنسدلة بالأعلى");

    document.getElementById('purPrice').value = '';

  function selectedCollection() {

  function collectionTotals(c) {
    if (!c) return {collected: 0, spent: 0, balance: 0, paid: 0};
    var ps = c.payments || {};
    var collected = 0;
    var paidCount = 0;
    var keys = Object.keys(ps);
    for (var k = 0; k < keys.length; k++) {
      var p = ps[keys[k]];
      if (p.status === 'paid') {
        collected += Number(p.amount || c.amount || 0);
        paidCount++;
      }
    }
    var spent = 0;
    for (var j = 0; j < db.purchases.length; j++) {
      if (db.purchases[j].collectionId === c.id) {
        spent += Number(db.purchases[j].price || 0);
      }
    }
    return { collected: collected, spent: spent, balance: collected - spent, paid: paidCount };
  }

  function memberWord(n) {
    n = Number(n || 0);
    if (n === 1) return 'عضو';
    if (n === 2) return 'عضوان';
    return 'أعضاء';
  }

  function collectionFullTotals(c) {
    var base = collectionTotals(c);
    var totalMembers = db.members.length;
    var paid = base.paid || 0;
    var expected = totalMembers * Number((c && c.amount) || 0);
    var remaining = Math.max(0, expected - base.collected);
    var percent = totalMembers ? Math.round((paid / totalMembers) * 100) : 0;
    return { collected: base.collected || 0, spent: base.spent || 0, balance: base.balance || 0, paid: paid, totalMembers: totalMembers, remaining: remaining, percent: percent };
  }

  function statusIconHTML(status) {
    if (status === 'paid') {
      return '<div class="status-avatar paid"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>';
    }
    if (status === 'leave') {
      return '<div class="status-avatar leave"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="M12 14v4"/><path d="M10 16h4"/></svg></div>';
    }
    if (status === 'exempt') {
      return '<div class="status-avatar exempt"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/></svg></div>';
    }
    return '<div class="status-avatar unpaid"><svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></div>';
  }

  function renderCollectionDetail() {
    var c = null;
    for (var i = 0; i < db.collections.length; i++) {
      if (db.collections[i].id === currentViewCollectionId) { c = db.collections[i]; break; }
    }
    if (!c) return;
    
    document.getElementById('detailTitle').innerText = c.name;
    renderCollectionSummary(c);
    
    var mHTML = "";
    var found = false;
    for (var j = 0; j < db.members.length; j++) {
      var m = db.members[j];
      var p = (c.payments && c.payments[m.id]) ? c.payments[m.id] : { status: 'unpaid', amount: c.amount || 0 };
      
      var show = true;
      if (paymentFilter === 'paid' && p.status !== 'paid') show = false;
      if (paymentFilter === 'unpaid' && p.status !== 'unpaid') show = false;
      
      if (show) {
        found = true;
        var statusHTML = p.status === 'paid' ? '<span class="status-badge status-paid">مسدد</span>' : 
                         (p.status === 'exempt' ? '<span class="status-badge" style="background:var(--primary); color:white;">معفى</span>' : 
                         (p.status === 'leave' ? '<span class="status-badge" style="background:#FFF8E1; color:#F9A825;">إجازة</span>' :
                         '<span class="status-badge status-unpaid">متأخر</span>'));
        
        var actionBtns = '<div class="action-row"><button class="btn-icon edit" onclick="editPaymentAmount(\''+m.id+'\')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button><button class="btn-icon more" onclick="openPaymentSheetFor(\''+m.id+'\')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg></button></div>';

        mHTML += '<div class="list-item"><div class="item-main">' + statusIconHTML(p.status) + '<div class="item-content"><h4>' + m.name + '</h4><p>المطلوب: ' + money(p.amount) + ' ﷼</p></div><div class="item-trailing">' + actionBtns + '</div></div></div>';
      }
    }
    document.getElementById('paymentsList').innerHTML = found ? mHTML : '<div class="empty-state">لا يوجد أعضاء في هذا التصنيف</div>';
  }

  function renderReports() {
    var id = document.getElementById('reportCollectionSelect').value;
    var c = null;
    for (var i = 0; i < db.collections.length; i++) {
      if (db.collections[i].id === id) { c = db.collections[i]; break; }
    }
    if (!c) { document.getElementById('reportsContent').innerHTML = ''; return; }

    var rHTML = "";
    for (var j = 0; j < db.members.length; j++) {
      var m = db.members[j];
      var p = (c.payments && c.payments[m.id]) ? c.payments[m.id] : { status: 'unpaid', amount: c.amount || 0 };
      var statusStr = p.status === 'paid' ? 'مسدد' : (p.status === 'exempt' ? 'معفى' : (p.status === 'leave' ? 'إجازة' : 'متأخر'));
      rHTML += '<tr><td>' + (j+1) + '</td><td class="muted-name">' + m.name + '</td><td class="amount-cell">' + money(p.amount) + ' ﷼</td><td class="status-cell">' + statusStr + '</td></tr>';
    }

    document.getElementById('reportsContent').innerHTML =
      '<div class="report-box report-a4" id="printArea">' +
        '<div class="report-title">' +
          '<h2>نظام إدارة الإعاشة</h2>' +
          '<h3>تقرير ' + c.name + '</h3>' +
          '<p>التاريخ: ' + (c.date || '-') + '</p>' +
        '</div>' +
        '<table class="report-table"><thead><tr><th>#</th><th>الاسم</th><th>القطة</th><th>الحالة</th></tr></thead><tbody>' + rHTML + '</tbody></table>'+
      '</div>';
  }

  window.onload = function() {
    load();
    applyTheme(db.theme || 'violet');
    var dateInput = document.getElementById('colDate');
    if (dateInput) dateInput.value = today();
    renderAll();
  };

} catch (globalError) {
  alert("عذراً، حدث خطأ غير متوقع: " + globalError.message);
}
</script>
<script>

window.shareReport = async function() {
  var area = document.getElementById('printArea');
  if (!area) {
    alert('اختر قطة للتقرير أولاً');
    return;
  }
  try {
    if (window.html2canvas) {
      var clone = area.cloneNode(true);
      clone.style.width = '794px';
      clone.style.minHeight = '1123px';
      clone.style.position = 'fixed';
      clone.style.left = '-9999px';
      clone.style.top = '0';
      clone.style.borderRadius = '0';
      document.body.appendChild(clone);
      var canvas = await html2canvas(clone, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true,
        width: 794,
        height: 1123,
        windowWidth: 794,
        windowHeight: 1123
      });
      document.body.removeChild(clone);
      canvas.toBlob(async function(blob) {
        var file = new File([blob], 'تقرير-الإعاشة-A4.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ title: 'تقرير الإعاشة', files: [file] });
        } else {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'تقرير-الإعاشة-A4.png';
          a.click();
          URL.revokeObjectURL(url);
        }
      }, 'image/png');
    } else {
      window.print();
    }
  } catch (e) {
    window.print();
  }
};

</script>
